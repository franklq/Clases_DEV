*{
    margin:0;
    padding:0;
    box-sizing:border-box;

body{
    background:#0d0d0d;
    font-family:'Segoe UI', sans-serif;
}

header{
    background:linear-gradient(90deg,#1a1a1a,#2b0038);
    padding:20px 40px;
    box-shadow:0 0 20px rgba(199,125,255,0.3);
}

header h1{
    color:#c77dff;
    text-align:center;
    margin-bottom:20px;
    letter-spacing:4px;
    text-transform:uppercase;
    text-shadow:0 0 10px #c77dff;
}

nav ul{
    list-style:none;
    display:flex;
    justify-content:center;
    gap:30px;
    flex-wrap:wrap;
}

nav ul li a{
    color:#d8d8d8;
    text-decoration:none;
    padding:10px 15px;
    transition:0.3s;
    border-bottom:2px solid transparent;
}

nav ul li a:hover{
    color:#ff4d6d;
    border-bottom:2px solid #ff4d6d;
    text-shadow:0 0 8px #ff4d6d;
}
